name: Deploy PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy PR ${{ github.event.pull_request.number }} preview
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install surge
        run: npm install -g surge

      - name: Deploy preview to surge.sh
        id: deploy
        env:
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: |
          DOMAIN="pr-${{ github.event.pull_request.number }}-nest-viewer.surge.sh"
          surge . "$DOMAIN" --token "$SURGE_TOKEN"
          echo "url=https://$DOMAIN" >> "$GITHUB_OUTPUT"
          echo "domain=$DOMAIN" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const sha = '${{ github.event.pull_request.head.sha }}'.slice(0, 7);
            const marker = '<!-- pr-preview-comment -->';

            const body = [
              marker,
              '## 🔍 PR Preview Environment',
              '',
              `| | |`,
              `|---|---|`,
              `| **Preview URL** | [${url}](${url}) |`,
              `| **Commit** | \`${sha}\` |`,
              '',
              '_This preview is automatically updated on each push and removed when the PR is closed._'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
