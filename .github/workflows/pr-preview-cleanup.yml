name: Cleanup PR Preview

on:
  pull_request:
    types: [closed]

jobs:
  cleanup-preview:
    name: Teardown PR ${{ github.event.pull_request.number }} preview
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install surge
        run: npm install -g surge

      - name: Teardown surge preview
        env:
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: |
          DOMAIN="pr-${{ github.event.pull_request.number }}-nest-viewer.surge.sh"
          surge teardown "$DOMAIN" --token "$SURGE_TOKEN"

      - name: Update PR comment to reflect teardown
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-preview-comment -->';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (!existing) return;

            const body = [
              marker,
              '## ~~🔍 PR Preview Environment~~',
              '',
              '_Preview environment has been removed now that this PR is closed._'
            ].join('\n');

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
