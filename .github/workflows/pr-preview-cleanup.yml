name: Cleanup PR Preview

on:
  pull_request:
    types: [closed]

jobs:
  cleanup-preview:
    name: Teardown PR ${{ github.event.pull_request.number }} preview
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Remove preview directory from gh-pages branch
        run: |
          git clone \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            gh-pages
          cd gh-pages
          if ! git ls-remote --exit-code --heads origin gh-pages; then
            echo "gh-pages branch does not exist — nothing to clean up."
            exit 0
          fi
          git checkout gh-pages
          if [ ! -d "pr/${{ github.event.pull_request.number }}" ]; then
            echo "Preview directory not found — nothing to clean up."
            exit 0
          fi
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git rm -rf "pr/${{ github.event.pull_request.number }}"
          git commit -m "Remove PR #${{ github.event.pull_request.number }} preview"
          git push origin gh-pages

      - name: Update PR comment to reflect teardown
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-preview-comment -->';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (!existing) return;

            const body = [
              marker,
              '## ~~🔍 PR Preview Environment~~',
              '',
              '_Preview environment has been removed now that this PR is closed._'
            ].join('\n');

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });

